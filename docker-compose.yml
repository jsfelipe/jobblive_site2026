services:
  site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobblive-site
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - site_node_modules:/app/node_modules
      - site_next:/app/.next
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      # Detecção de arquivos no WSL2
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  site_node_modules:
  site_next:
